<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/cadastro.css">
        <title>Cadastro</title>
    </head>
    <body>
         <header id="header">
            <h1 id="tituloCadastro">Cadastro Funcionários </h1>
            <nav>
                <ul>
                    <li><a href="#">Inicio</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                </ul>
            </nav>
        </header>
        <main id="main" >
            <form action="cadastro" method="POST">
                <div class="container">
                    <div class="dadosPessoais">
                        <label for="nameFirst">NOME</label>
                        <input type="text" name="nameFirst" id="nameFirst" placeholder="Digite o seu Nome" />
                        <label for="sobreNome">SOBRENOME</label>
                        <input type="text" name="sobreNome" id="sobreNome" placeholder="Digite o seu sobrenome" />
                        <label for="matricula">MATRICULA</label>
                        <input type="text" name="matricula" id="matricula" placeholder="Digite a sua matricula" />
                        <label for="cpf">CPF</label>
                        <input type="text" name="cpf" id="cpf" placeholder="Digite o seu CPF" />
                        <p>Sexo</p>
                        <select name="opcao" id="opcao">
                            <option value="">Selecione o sexo</option>
                            <option value="1">Masculino</option>
                            <option value="2">Feminino</option>
                        </select>
                        <label for="dtaNascimento">Data de Nascimento</label>
                        <input type="date" name="dtaNascimento" id="dtaNascimento" />
                        <label for="email">E-MAIL</label>
                        <input type="email" name="email" id="email" placeholder="Digite o seu E-mail" />
                        <label for="telefone">TELEFONE</label>
                        <input type="tel" name="telefone" id="telefone" placeholder="(00)0 0000-0000" />
                        <label for="usuario">USUÁRIO</label>
                        <input type="text" name="usuario" id="usuario" placeholder="Digite o seu usuário" />
                        <label for="senha">SENHA</label>
                        <input type="password" name="senha" id="senha" placeholder="Digite a sua senha" />
                        <label for="funcao">FUNÇÃO</label>
                        <input type="text" name="funcao" id="funcao" placeholder="Digite a sua função" />
                    </div>
                    <div class="containerEndereco">
                        <label for="cep">CEP</label>
                        <input type="text" name="cep" id="cep"  />
                        <label for="endereco">ENDEREÇO</label>
                        <input type="text" name="endereco" id="endereco" />
                        <label for="cidade">CIDADE</label>
                        <input type="text" name="cidade" id="cidade" />
                        <label for="bairro">BAIRRO</label>
                        <input type="text" name="bairro" id="bairro" />
                        <label for="estado">ESTADO</label>
                        <input type="text" name="estado" id="estado" />
                        <label for="numero">NÚMERO</label>
                        <input type="text" name="numero" id="numero" />
                        <label for="complemento">COMPLEMENTO</label>
                        <input type="text" name="complemento" id="complemento" />
                    </div>
                    <div class="btn">
                        <button type="submit">Cadastrar</button>
                    </div>
                </div>
            </form>
        </main>
        <script src="../js/cep.js"></script>
    </body>
</html>
