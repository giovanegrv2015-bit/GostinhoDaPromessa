<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/reset.css"/>
        <link rel="stylesheet" href="../css/color.css"/>
        <link rel="stylesheet" href="../css/gerenciamento.css"/>
        <title>Gerenciamento</title>
    </head>
    
    <body>
        <header id="header">
            <h1 id="tituloCadastro">Sistema de Estoque</h1>
            <nav id="menu">
                <ul class="menu-lista">
                    <li><a href="dashboard.html">Início</a></li>
                    <li><a href="gerenciamento.html">Gerenciamento</a></li>
                    <li><a href="cadastro.html" class="btn-menu">Cadastro</a></li>
                    <li><a href="#" id="btnLogout" class="btn-menu">Sair</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section id="secaoItens">
                <div class="secao-topo">
                    <h2 class="secao-titulo">Itens em Estoque</h2>
                    <div class="barra-acoes">
                        <input type="text" id="buscarGerenciamento" class="input-busca" placeholder="Buscar item pelo nome">
                        <a href="cadastroItens.html" class="btn-novo-item">Novo Item</a>
                    </div>
                </div>
                <div id="listaItens" class="lista-item">
                    <div class="loading-msg" id="loadingMsg">Carregando Itens</div>
                </div>
            </section>
        </main>

        <div id="modalOverlay" class="modal-overlay" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modalTitulo">Editar Item</h3>
                    <button class="modal-fechar" id="btnFecharModal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Nome do Item</label>
                            <input type="text" id="modal-nomeItem"/>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Fabricante</label>
                            <input type="text" id="modal-fabricante"/>
                        </div>
                        <div class="grupo-form">
                            <label>Marca</label>
                            <input type="text" id="modal-marca"/>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Data de Fabricação</label>
                            <input type="date" id="modal-dataFabricacao"/>
                        </div>
                        <div class="grupo-form">
                            <label>Data de Vencimento</label>
                            <input type="date" id="modal-dataVencimento"/>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Quantidade</label>
                            <input type="number" id="modal-quantidade"/>
                        </div>
                        <div class="grupo-form">
                            <label>Valor Unitário</label>
                            <input type="number" step="0.01" id="modal-valor"/>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Total</label>
                            <input type="number" id="modal-total" disabled class="input-disabled"/>
                        </div>
                        <div class="grupo-form">
                            <label>Status</label>
                            <select id="modal-status">
                                <option value="entrada">Entrada</option>
                                <option value="saida">Saída</option>
                            </select>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Local de Armazenamento</label>
                            <select id="modal-local">
                                <option value="Freezer">Freezer</option>
                                <option value="Refrigerador">Refrigerador</option>
                                <option value="Prateleira">Prateleira</option>
                            </select>
                        </div>
                        <div class="grupo-form">
                            <label>Categoria</label>
                            <select id="modal-categoria">
                                <option value="Matéria Prima">Matéria Prima</option>
                                <option value="Produto final">Produto final</option>
                                <option value="Embalagens">Embalagens</option>
                            </select>
                        </div>
                    </div>
                    <div class="linha-form">
                        <div class="grupo-form">
                            <label>Estoque Mínimo</label>
                            <input type="number" id="modal-estoqueMinimo" min="0"/>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="btnSalvarEdicao" class="btn-salvar">Salvar Alterações</button>
                    <button id="btnExcluirItem" class="btn-excluir">Excluir Item</button>
                    <button id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
                </div>
            </div>
        </div>

        <script src="../js/gerenciamento.js"></script>
        <script src="../js/validarLogin.js"></script>
        <script src="../js/logout.js"></script>
    </body>
</html>
