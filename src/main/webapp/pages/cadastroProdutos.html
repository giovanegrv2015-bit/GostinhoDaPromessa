<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="../css/reset.css" />
        <link rel="stylesheet" href="../css/color.css" />
        <link rel="stylesheet" href="../css/cadastroProdutos.css"/>
        <title>Cadastro Produto</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <header id="header">
            <h1 id="tituloCadastro">Sistema de estoque</h1>
            <nav id="menu">
                <ul class="menu-lista">
                    <li><a href="dashboard.html">Início</a></li>
                    <li><a href="#">Gerenciamento</a></li>
                    <li><a href="cadastro.html" class="btn-menu">Cadastro</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section id ="form-container">
                <form action="../cadastroProdutos" method="POST" id="formCadastro">
                    <div class="linha-form">
                    <div class="grupo-form">
                        <label for="codigoBarras">Código de Barras</label>
                        <input type="text" name="codigoBarras" id="codigoBarras" required />
                    </div>
                    <div class="grupo-form">
                        <label for="nomeItem" >Nome do Item</label>
                        <input type="text" name="nomeItem" id="nomeItem" required />
                    </div>
                    </div>

                    <div class="linha-form">
                    <div class="grupo-form">
                        <label for="fabricante" >Fabricante</label>
                        <input type="text" name="fabricante" id="fabricante" required />
                    </div>
                    <div class="grupo-form">
                        <label for="marca" >Marca</label>
                        <input type="text" name="marca" id="marca" required />
                    </div>
                    </div>

                    <div class="linha-form">
                        <div class="grupo-form">
                            <label for="dataFabricacao" >Data de Fabricação</label>
                            <input type="date" name="dataFabricacao" id="dataFabricacao" required />
                        </div>

                        <div class="grupo-form">
                            <label for="dataVencimento" >Data de Vencimento</label>
                            <input type="date" name="dataVencimento" id="dataVencimento" required />
                        </div>
                    </div>

                    <div class="linha-form">
                        <div class="grupo-form">
                            <label for="quantidade" >Quantidade</label>
                            <input type="number" name="quantidade" id="quantidade" />
                        </div>

                        <div class="grupo-form">
                            <label for="valor" >Valor Unitário</label>
                            <input type="number" name="valor" id="valor" />
                        </div>
                    </div>

                    <div class="linha-form">
                        <div class="grupo-form full">
                            <label>Total</label>
                            <input type="number" name="total" id="total" />
                        </div>
                        <div class="grupo-form full">
                            <label for="status">Status</label>
                            <select id="status" name="status">
                                <option value="entrada">Entrada</option>
                                <option value="saida">Saída</option>
                            </select>
                        </div>
                    </div>

                    <div class="linha-form">
                        <div class="grupo-form">
                            <label for="local">Local de Armazenamento</label>
                            <select name="local" id="local" required>
                                <option value="">Selecione o Local</option>
                                <option value="Freezer">Freezer</option>
                                <option value="Refrigerador">Refrigerador</option>
                                <option value="Prateleira">Prateleira</option>
                            </select>
                        </div>
                        <div class="grupo-form">
                            <label for="categoria">Categoria</label>
                            <select name="categoria" id="categoria" required>
                                <option value="">Selecione a categoria</option>
                                <option value="Matéria Prima">Matéria Prima</option>
                                <option value="Produto Final">Produto Final</option>
                                <option value="Embalagens">Embalagens</option>
                            </select>
                        </div>
                    </div>

                    <div class="linha=forma">
                        <div class="grupo-form">
                            <label for="estoqueMinimo">Estoque Mínimo</label>
                            <input type="number" name="estoqueMinimo" id="estoqueMinimo" min="0" placeholder="Qtd. mínima do alerta" required/>
                        </div>
                    </div>

                    <div class="acoes-form">
                        <button type="submit" class="btn-salvar">Salvar</button>
                        <a href="dashboard.html" class="btn-cancelar">Cancelar</a>
                    </div>
                </form>
            </section>
        </main>
        <script src="../js/cadastroProdutos.js"></script>
    </body>
</html>
