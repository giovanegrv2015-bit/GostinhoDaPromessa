<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css"/>
    <link rel="stylesheet" href="css/color.css"/>
    <link rel="stylesheet" href="css/login.css"/>
    <title>Gostinho Da Promessa</title>
</head>

<body>
    <header>
        <div class="box-title">
        </div>
    </header>
    <main>
        <form action="login" method="post">
            <div class="content">
                <div class="Login"> 
                    <h2 class="Title">Login</h2>
                <hr>
                </div>
                <div class="User">
                    <label>Usuário</label>
                    <hr>
                    <input type="text" name="users" class="inputUser" placeholder="Informe o Usuário" />
                    </div>
                <div class="Password">
                    <label>Senha</label>
                    <hr>
                    <input type="password" name="psw" class="inputPassword" placeholder="Informe a sua senha" />
                    </div>
                <div class="box-button">
                    <button type="submit" class="button">Entrar</button>
                </div>
            </div>
        </form>
    </main>
</body>

</html>
