<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css"/>
    <link rel="stylesheet" href="css/color.css"/>
    <link rel="stylesheet" href="css/login.css"/>
    <title>Sistema estoque</title>
</head>

<body>
    <header>
        <div class="box-title">
        </div>
    </header>
    <main>
        <form action="login" method="post">
            <div class="content">
                <div class="Login"> 
                <h2>Login</h2>
                <hr>
                </div>
                <div class="User">
                    <label>Usuário</label>
                    <hr>
                    </div>
                    <input type="text" name="users" class="inputUser" placeholder="Informe o Usuário" />
                <div class="Password">
                    <label>Senha</label>
                    <hr>
                    </div>
                    <input type="password" name="psw" class="inputPassword" placeholder="Informe a senha" />
                <div class="box-button">
                    <button type="submit" class="button">Entrar</button>
                </div>
            </div>
        </form>
    </main>
    <footer></footer>
</body>

</html>
